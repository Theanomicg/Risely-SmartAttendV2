# ─────────────────────────────────────────────────────────────────────────────
# SmartAttend v2 — Nginx Production Config
# Replace yourdomain.com with your actual domain
#
# Steps to deploy:
#   1. sudo apt install nginx certbot python3-certbot-nginx
#   2. sudo cp this file /etc/nginx/sites-available/smartattend
#   3. sudo ln -s /etc/nginx/sites-available/smartattend /etc/nginx/sites-enabled/
#   4. sudo certbot --nginx -d yourdomain.com -d api.yourdomain.com
#   5. sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# Frontend — yourdomain.com
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS (certbot fills this in)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/smartattend/frontend/dist;
    index index.html;

    # Serve React SPA
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # WebSocket proxy
    location /ws {
        proxy_pass          http://127.0.0.1:8000/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "Upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
    }

    # Camera snapshots
    location /snapshots/ {
        proxy_pass http://127.0.0.1:8000/snapshots/;
    }
}


# ── Separate API subdomain (optional) ────────────────────────────────────────
